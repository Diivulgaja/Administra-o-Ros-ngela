<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliar atendimento | RôSouza Estética</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:Inter,sans-serif}.star.active{color:#D78686}</style>
</head>
<body class="bg-[#F8F5F4] min-h-screen text-[#1C1717]">
  <main class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-[32px] border border-[#E9D7D7] shadow-xl p-6 md:p-8">
      <p class="text-xs uppercase tracking-[0.16em] text-[#7C6F6F] font-semibold">Avaliação</p>
      <h1 class="text-3xl md:text-4xl font-semibold mt-2" style="font-family:'Playfair Display',serif">Conte como foi seu atendimento</h1>
      <p id="reviewInfo" class="text-sm text-[#7C6F6F] mt-3">Validando seu link...</p>
      <form id="reviewForm" class="mt-8 space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium mb-2">Sua nota</label>
          <div id="stars" class="flex gap-2 text-3xl cursor-pointer select-none">
            <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
          </div>
          <input type="hidden" id="rating" value="5" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Como seu nome deve aparecer</label>
          <input id="publicName" class="w-full rounded-2xl border border-[#E9D7D7] px-4 py-3 outline-none" placeholder="Ex.: Mariana C." />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Título</label>
          <input id="title" class="w-full rounded-2xl border border-[#E9D7D7] px-4 py-3 outline-none" placeholder="Resumo da sua experiência" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Comentário</label>
          <textarea id="comment" class="w-full rounded-2xl border border-[#E9D7D7] px-4 py-3 min-h-[140px] outline-none" placeholder="Escreva sua opinião"></textarea>
        </div>
        <button class="px-5 py-3 rounded-2xl bg-[#D78686] text-white font-semibold">Enviar avaliação</button>
      </form>
      <div id="resultBox" class="hidden mt-6 rounded-2xl bg-[#F6E8E8] p-4"></div>
    </div>
  </main>
  <script src="./app.config.js"></script>
  <script>
    const supabase = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseAnonKey);
    const infoEl = document.getElementById('reviewInfo');
    const form = document.getElementById('reviewForm');
    const resultBox = document.getElementById('resultBox');
    const token = new URLSearchParams(location.search).get('token');
    let requestData = null;

    function setStars(value){document.querySelectorAll('.star').forEach(s=>s.classList.toggle('active', Number(s.dataset.value)<=value));document.getElementById('rating').value=value}
    document.querySelectorAll('.star').forEach(s=>s.addEventListener('click',()=>setStars(Number(s.dataset.value))));
    setStars(5);

    async function validateToken(){
      if(!token){infoEl.textContent='Link inválido.';return}
      const {data,error}=await supabase.from('review_requests').select('*').eq('token',token).maybeSingle();
      if(error||!data){infoEl.textContent='Solicitação não encontrada.';return}
      if(data.used_at){infoEl.textContent='Este link já foi utilizado.';return}
      requestData=data; infoEl.textContent='Seu atendimento foi localizado. Pode enviar sua avaliação.'; form.classList.remove('hidden')
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      try{
        const {data,error}=await supabase.rpc('submit_review_with_token',{
          p_token:token,
          p_rating:Number(document.getElementById('rating').value),
          p_title:document.getElementById('title').value.trim()||null,
          p_comment:document.getElementById('comment').value.trim()||null,
          p_public_name:document.getElementById('publicName').value.trim()||'Cliente'
        });
        if(error) throw error;
        form.classList.add('hidden');
        resultBox.classList.remove('hidden');
        resultBox.textContent='Avaliação enviada com sucesso. Obrigada pelo seu feedback!';
        infoEl.textContent='Recebemos sua avaliação.';
      }catch(err){
        resultBox.classList.remove('hidden');
        resultBox.textContent=err.message||'Não foi possível enviar sua avaliação.';
      }
    });

    validateToken();
  </script>
</body>
</html>
